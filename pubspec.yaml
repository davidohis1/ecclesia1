name: ecclesia
description: A Christian social media app for believers worldwide
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^12.1.3
  
  # Media
  image_picker: ^1.0.5
  video_player: ^2.8.1
  chewie: ^1.7.4
  file_picker: ^6.1.1
  cached_network_image: ^3.3.0
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  
  # HTTP & Storage
  dio: ^5.4.0
  http: ^1.1.2
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  image_cropper: ^5.0.1
  photo_view: ^0.14.0
  
  # PDF
  syncfusion_flutter_pdfviewer: ^24.1.44
  
  # Utils
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  timeago: ^3.6.1
  permission_handler: ^11.1.0
  path_provider: ^2.1.2
  flutter_local_notifications: ^16.1.0
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  
