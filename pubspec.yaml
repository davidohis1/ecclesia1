name: ecclesia
description: A Christian social media app for believers worldwide
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^17.1.0
  
  # Media
  image_picker: ^1.0.5
  video_player: ^2.8.1
  chewie: ^1.7.4
  file_picker: ^10.3.10
  cached_network_image: ^3.3.0
  just_audio: ^0.10.5
  audio_session: ^0.2.2
  
  # HTTP & Storage
  dio: ^5.4.0
  http: ^1.1.2
  
  # UI
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.9
  lottie: ^3.3.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  flutter_staggered_grid_view: ^0.7.0
  image_cropper: ^11.0.0
  photo_view: ^0.15.0
  
  # PDF
  syncfusion_flutter_pdfviewer: ^32.2.7
  
  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  timeago: ^3.6.1
  permission_handler: ^12.0.1
  path_provider: ^2.1.2
  flutter_local_notifications: ^20.1.0
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  
